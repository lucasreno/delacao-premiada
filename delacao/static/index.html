<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Delação Premiada - Revisão</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg:#f4f5f3; --bg-grad: radial-gradient(1200px 500px at 10% -10%, #eaf3ee 0%, transparent 60%), #f4f5f3;
    --card:#fff; --card-border:#e5e7e2; --ink:#16181a; --mut:#6b6f68; --mut-soft:#8b8f86;
    --acc:#0a7a4a; --acc-hov:#086a40; --acc-ink:#fff; --acc-soft:#e6f4ec;
    --warn:#c0392b; --warn-soft:#fbeceb; --lac:#fff1dc; --lac-strong:#f3ad4b;
    --low:#fffaeb; --ring: rgba(10,122,74,.35);
    --radius:10px; --radius-sm:7px; --shadow-sm:0 1px 2px rgba(20,20,15,.05), 0 1px 1px rgba(20,20,15,.03);
    --shadow-md:0 4px 14px rgba(20,20,15,.06), 0 1px 3px rgba(20,20,15,.05);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#14161a; --bg-grad: radial-gradient(1200px 500px at 10% -10%, #182420 0%, transparent 60%), #14161a;
      --card:#1b1e22; --card-border:#2a2e33; --ink:#eef0ee; --mut:#9a9e9a; --mut-soft:#7d8180;
      --acc:#22c07f; --acc-hov:#2ad78e; --acc-ink:#0c1210; --acc-soft:#173427;
      --warn:#ff6b5e; --warn-soft:#3a1f1c; --lac:#3a2c14; --lac-strong:#e0972f;
      --low:#2e2a17; --ring: rgba(34,192,127,.35);
      --shadow-sm:0 1px 2px rgba(0,0,0,.3); --shadow-md:0 6px 20px rgba(0,0,0,.35);
    }
  }
  * { box-sizing:border-box; }
  ::selection { background:var(--acc-soft); }
  body {
    font:14px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background:var(--bg-grad); color:var(--ink); margin:0; padding:20px 16px 48px;
    -webkit-font-smoothing:antialiased;
  }
  h1 { font-size:19px; font-weight:700; margin:0; letter-spacing:-.01em; display:flex; align-items:center; gap:9px; }
  h1 .logo { width:22px; height:22px; color:var(--acc); flex:none; }
  header, section { max-width:1120px; margin:0 auto 16px; }
  header {
    display:flex; gap:14px; align-items:center; flex-wrap:wrap;
    background:var(--card); border:1px solid var(--card-border); border-radius:var(--radius);
    padding:12px 16px; box-shadow:var(--shadow-sm); position:sticky; top:8px; z-index:20;
    backdrop-filter:saturate(1.4);
  }
  .card { background:var(--card); border:1px solid var(--card-border); border-radius:var(--radius); padding:16px; box-shadow:var(--shadow-sm); }
  .card + .card { margin-top:16px; }
  .card > b, .card-title { font-size:13px; font-weight:700; letter-spacing:.01em; text-transform:uppercase; color:var(--mut-soft); }

  button, a.btn {
    background:var(--acc); color:var(--acc-ink); border:0; border-radius:var(--radius-sm);
    padding:8px 15px; cursor:pointer; font:inherit; font-weight:600; text-decoration:none;
    display:inline-flex; align-items:center; gap:6px; line-height:1.2;
    transition:background-color .15s ease, transform .1s ease, box-shadow .15s ease;
    box-shadow:var(--shadow-sm);
  }
  button:hover, a.btn:hover { background:var(--acc-hov); }
  button:active, a.btn:active { transform:translateY(1px); }
  button:focus-visible, a.btn:focus-visible, input:focus-visible, select:focus-visible {
    outline:2px solid var(--ring); outline-offset:2px;
  }
  button:disabled { opacity:.55; cursor:not-allowed; transform:none; }
  button.sec, a.btn.sec { background:var(--mut-soft); color:#fff; }
  button.sec:hover, a.btn.sec:hover { background:var(--mut); }
  button.ghost, a.btn.ghost { background:transparent; color:var(--acc); box-shadow:none; border:1px solid var(--card-border); }
  button.ghost:hover, a.btn.ghost:hover { background:var(--acc-soft); border-color:var(--acc); }
  button.icon { padding:6px 8px; }
  button.icon svg { width:15px; height:15px; }

  input, select {
    border:1px solid var(--card-border); border-radius:var(--radius-sm); padding:6px 9px; font:inherit;
    background:var(--card); color:var(--ink); transition:border-color .15s ease, box-shadow .15s ease;
  }
  input::placeholder { color:var(--mut-soft); }
  input:hover, select:hover { border-color:var(--mut-soft); }
  input.time { width:68px; font-variant-numeric:tabular-nums; text-align:center; }
  td input:not(.time), td select { width:100%; }

  table { width:100%; border-collapse:collapse; }
  th { text-align:left; color:var(--mut-soft); font-weight:700; font-size:11px; text-transform:uppercase; letter-spacing:.04em; padding:6px 8px 10px; }
  td { padding:6px 8px; border-top:1px solid var(--card-border); vertical-align:middle; }
  .table-scroll { overflow-x:auto; }
  #tbl { min-width:900px; table-layout:fixed; }
  #tbl .col-time { width:84px; }
  #tbl .col-project { width:20%; }
  #tbl .col-ticket { width:12%; }
  #tbl .col-activity { width:16%; }
  #tbl .col-actions { width:82px; }
  .description-field { display:flex; align-items:center; gap:4px; }
  .description-field input { flex:1; min-width:0; }
  tbody tr { transition:background-color .15s ease; }
  tbody tr:hover { background:color-mix(in srgb, var(--acc) 4%, transparent); }
  tr.lacuna { background:var(--lac); }
  tr.lacuna:hover { background:var(--lac); }
  tr.low { background:var(--low); }
  tr.flash { animation:flash 1.4s; }
  @keyframes flash { from { background:var(--lac-strong); } }

  .chip {
    display:inline-flex; gap:8px; align-items:center; background:var(--acc-soft); color:var(--ink);
    border:1px solid var(--card-border); border-radius:999px; padding:4px 6px 4px 12px; margin:3px; font-size:12px;
  }
  .chip button { padding:2px 10px; font-size:11px; border-radius:999px; }
  .mut { color:var(--mut); } .err { color:var(--warn); font-weight:600; }
  .dot { width:9px; height:9px; border-radius:50%; display:inline-block; background:var(--warn); box-shadow:0 0 0 3px var(--warn-soft); transition:background-color .2s, box-shadow .2s; }
  .dot.ok { background:var(--acc); box-shadow:0 0 0 3px var(--acc-soft); }
  .conf { font-size:11px; color:var(--mut-soft); margin-left:5px; }
  .conf.low { color:var(--lac-strong); font-weight:700; }

  dialog {
    border:1px solid var(--card-border); border-radius:var(--radius); max-width:460px; width:90%;
    padding:20px; box-shadow:var(--shadow-md); background:var(--card); color:var(--ink);
  }
  dialog::backdrop { background:rgba(10,12,10,.45); backdrop-filter:blur(1px); }
  dialog label { display:block; margin:14px 0 4px; font-weight:600; font-size:12px; color:var(--mut-soft); text-transform:uppercase; letter-spacing:.02em; }
  dialog input { width:100%; }
  dialog form > label:first-child { margin-top:0; }

  .rl { display:flex; gap:8px; align-items:center; }
  .rl code {
    flex:1; background:#0d0f0d; color:#e4e6e0; padding:6px 10px; border-radius:var(--radius-sm);
    overflow-x:auto; white-space:pre; font-size:12.5px; border:1px solid #23261f;
  }
  .rl button { padding:4px 9px; }
  .ev { cursor:help; border-bottom:1px dotted var(--mut); }

  /* Timeline do dia */
  .tl { position:relative; height:34px; background:color-mix(in srgb, var(--card) 96%, var(--ink) 2%); border:1px solid var(--card-border); border-radius:var(--radius-sm); margin:10px 0 0; box-shadow:inset 0 1px 2px rgba(0,0,0,.04); }
  .tl .seg { position:absolute; top:5px; bottom:5px; border-radius:5px; min-width:3px; cursor:pointer; transition:filter .12s ease, transform .12s ease; box-shadow:0 1px 2px rgba(0,0,0,.15); }
  .tl .seg:hover { filter:brightness(1.12); transform:translateY(-1px); }
  .tl .seg.lacuna { background:var(--lac); background-image:repeating-linear-gradient(45deg, rgba(0,0,0,.14) 0 3px, transparent 3px 7px); }
  .tl .tick { position:absolute; bottom:1px; width:2px; height:7px; background:var(--mut-soft); border-radius:1px; }
  .tlaxis { position:relative; height:16px; font-size:10px; color:var(--mut-soft); font-variant-numeric:tabular-nums; }
  .tlaxis span { position:absolute; transform:translateX(-50%); }
  .tlleg { font-size:12px; color:var(--mut); display:flex; gap:14px; flex-wrap:wrap; margin-top:8px; }
  .tlleg .sw { width:9px; height:9px; border-radius:2px; display:inline-block; margin-right:5px; vertical-align:baseline; }

  @media (max-width: 640px) {
    body { padding:12px 10px 40px; }
    header { position:static; }
    .card { padding:12px; }
  }
</style>
</head>
<body>
<header>
  <h1><svg class="logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>Delação Premiada</h1>
  <span id="colStatus" class="mut"><span class="dot"></span> coletor</span>
  <input type="date" id="date">
  <span style="flex:1"></span>
  <button class="ghost" onclick="dlg.showModal()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg> Configurações</button>
</header>

<section class="card">
  <b>Jornada (ponto):</b>
  <input id="ponto" placeholder="09:00-12:00, 13:00-18:00" style="width:280px">
  <button class="sec" onclick="savePonto()">Salvar ponto</button>
  <button onclick="propose()">Gerar proposta</button>
  <button class="sec" onclick="reclassify()" title="Re-roda só a IA nos blocos não editados; horários e edições ficam intactos">Reclassificar IA</button>
  <span id="dayStatus" class="mut"></span>
  <div id="msg" class="err"></div>
  <div id="timeline"></div>
</section>

<section class="card">
  <div class="table-scroll">
    <table id="tbl">
      <colgroup>
        <col class="col-time"><col class="col-time"><col class="col-project"><col class="col-ticket">
        <col class="col-activity"><col><col class="col-actions">
      </colgroup>
      <thead><tr>
        <th>Início</th><th>Fim</th><th>Projeto</th><th>Ticket</th>
        <th>Atividade</th><th>Descrição</th><th></th>
      </tr></thead>
      <tbody></tbody>
    </table>
  </div>
  <div style="margin-top:8px">
    <button class="sec" onclick="addRow()">+ Linha</button>
    <button class="sec" onclick="saveBlocks()" title="Grava as edições sem aprovar o dia - use pra ir salvando enquanto revisa">Salvar edições</button>
    <button onclick="approve()" title="Grava as edições E aprova o dia (libera o envio ao Clockify e alimenta o aprendizado da IA)">Aprovar dia</button>
    <a id="csvLink" class="btn ghost" href="#" download>Baixar CSV</a>
  </div>
</section>

<section class="card">
  <details id="migalhasBox">
    <summary><b>Migalhas absorvidas</b> <span class="mut">(interrupções &lt; 5 min - promova se mereciam Lançamento)</span></summary>
    <div id="migalhas" style="margin-top:8px"></div>
  </details>
</section>

<section class="card" id="resumoCard" style="display:none">
  <b>Resumo aprovado</b>
  <span id="diverg" class="mut"></span>
  <button onclick="pushClockify()" title="Cria os Lançamentos no Clockify; reenviar substitui os que a ferramenta criou antes (nunca toca nos demais)">Enviar ao Clockify</button>
  <button class="ghost" onclick="copyAll()">Copiar tudo</button>
  <span id="pushMsg" class="mut"></span>
  <div id="resumo" style="margin-top:8px"></div>
</section>

<dialog id="dlg">
  <form method="dialog">
    <label>Clockify API key <span class="mut" id="ckState"></span></label>
    <input id="ck" placeholder="deixe vazio para manter">
    <label>OpenRouter API key <span class="mut" id="orState"></span></label>
    <input id="or" placeholder="deixe vazio para manter">
    <label>Modelo (OpenRouter)</label>
    <input id="model">
    <label>Jira - URL base <span class="mut">(ex.: https://empresa.atlassian.net; vazio = sem Jira)</span></label>
    <input id="jiraUrl">
    <label>Jira - e-mail <span class="mut">(Cloud; deixe vazio se usar token pessoal de Server/DC)</span></label>
    <input id="jiraEmail">
    <label>Jira - API token <span class="mut" id="jiraState"></span></label>
    <input id="jiraTok" placeholder="deixe vazio para manter">
    <div style="margin-top:12px; display:flex; gap:8px">
      <button type="button" onclick="saveSettings()">Salvar</button>
      <button type="button" class="sec" onclick="syncClockify()">Sincronizar Clockify</button>
      <button type="button" class="sec" onclick="syncJira()">Sincronizar Jira</button>
      <button type="button" class="ghost" onclick="dlg.close()">Fechar</button>
    </div>
    <div id="dlgMsg" class="mut"></div>
  </form>
</dialog>

<datalist id="projList"></datalist>

<script>
const $ = id => document.getElementById(id);
const dlg = $('dlg');
let options = { projetos: [], atividades: [] };
const state = { migalhas: [], resumo: [] };

// Títulos de janela e saídas da IA são dado hostil - escapar SEMPRE antes de interpolar em HTML.
const esc = s => String(s ?? '').replace(/[&<>"']/g,
  c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));

const toMin = hm => { const [h, m] = String(hm || '').split(':').map(Number); return h * 60 + (m || 0); };
const toHM = min => `${String(Math.floor(min / 60)).padStart(2, '0')}:${String(min % 60).padStart(2, '0')}`;

const api = async (path, method = 'GET', body) => {
  const r = await fetch('/api' + path, {
    method, headers: { 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined
  });
  const j = await r.json();
  if (!r.ok) throw new Error(j.detail || r.statusText);
  return j;
};
const msg = t => { $('msg').textContent = t || ''; };

function tagSelect(v) {
  const opts = ['<option value=""></option>']
    .concat(options.atividades.map(a => `<option ${a === v ? 'selected' : ''}>${esc(a)}</option>`));
  return `<select data-f="atividade">${opts.join('')}</select>`;
}

function row(b) {
  const tr = document.createElement('tr');
  tr.dataset.id = b.id || '';
  tr.dataset.kind = b.kind || 'work';
  if (b.kind === 'lacuna') {
    tr.className = 'lacuna';
    tr.innerHTML = `
      <td><input class="time" data-f="start" value="${esc(b.start)}"></td>
      <td><input class="time" data-f="end" value="${esc(b.end)}"></td>
      <td colspan="4"><b>Lacuna (${b.dur_min} min sem atividade)</b> - estava em quê?
        <button onclick="lacunaTrabalho(this)">Era trabalho</button>
        <button class="sec" onclick="lacunaPausa(this)">Era pausa/almoço</button></td>
      <td></td>`;
    return tr;
  }
  const ev = Object.entries(b.evidence?.titles || {})
    .map(([t, s]) => `${Math.round(s / 60)}min ${t}`).join('\n');
  const mig = Object.keys(b.evidence?.migalhas || {}).length
    ? '\nmigalhas absorvidas: ' + Object.entries(b.evidence.migalhas)
      .map(([t, s]) => `${Math.max(1, Math.round(s / 60))}min ${t}`).join('; ') : '';
  const shadow = Object.keys(b.evidence?.shadow || {}).length
    ? ` ⚠ paralelo: ${Object.entries(b.evidence.shadow).map(([k, s]) => `${k} ${Math.round(s / 60)}min`).join(', ')}` : '';
  const conf = b.confianca != null
    ? `<span class="conf${b.confianca < 0.7 ? ' low' : ''}" title="confiança da IA">${b.confianca < 0.7 ? '⚠ ' : ''}${Math.round(b.confianca * 100)}%</span>` : '';
  const edited = b.edited ? '<span class="conf" title="editado por você">✎</span>' : '';
  const evidence = [`Contexto: ${b.contexto || 'manual'}`, ev + mig + shadow].filter(Boolean).join('\n');
  if (b.confianca != null && b.confianca < 0.7) tr.className = 'low';
  tr.innerHTML = `
    <td><input class="time" data-f="start" value="${esc(b.start)}"></td>
    <td><input class="time" data-f="end" value="${esc(b.end)}"></td>
    <td><input data-f="projeto" list="projList" value="${esc(b.projeto)}"></td>
    <td><input data-f="ticket" value="${esc(b.ticket)}"></td>
    <td>${tagSelect(b.atividade)}</td>
    <td><div class="description-field" title="${esc(evidence)}"><input data-f="descricao" value="${esc(b.descricao)}">${shadow ? '<span class="conf" title="atividade paralela detectada">⚠</span>' : ''}${conf}${edited}</div></td>
    <td>${b.id ? `<button class="ghost" title="Reclassificar só este bloco via IA" onclick="reclassifyOne(${b.id})">🔁</button>` : ''}<button class="ghost" onclick="this.closest('tr').remove()">✕</button></td>`;
  return tr;
}

function lacunaTrabalho(btn) {
  const tr = btn.closest('tr');
  const [s, e] = [...tr.querySelectorAll('input')].map(i => i.value);
  tr.replaceWith(row({ start: s, end: e, kind: 'work' }));
}
function lacunaPausa(btn) {
  const tr = btn.closest('tr'), prev = tr.previousElementSibling;
  const end = tr.querySelector('[data-f=end]').value;
  if (prev) prev.querySelector('[data-f=end]').value = end; // emenda ao anterior
  tr.remove();
}

function addRow() { $('tbl').tBodies[0].appendChild(row({ start: '', end: '', kind: 'work' })); }

function collect() {
  return [...$('tbl').tBodies[0].rows].map(tr => {
    const g = f => tr.querySelector(`[data-f=${f}]`)?.value || null;
    return { id: tr.dataset.id ? +tr.dataset.id : null, kind: tr.dataset.kind,
      start: g('start'), end: g('end'), projeto: g('projeto'), ticket: g('ticket'),
      atividade: g('atividade'), descricao: g('descricao') };
  }).filter(b => b.start && b.end);
}

/* ---------- Timeline do dia ---------- */
// Paleta categórica validada (CVD ΔE 24.2 na superfície clara); a tabela abaixo é a
// "visão tabela" exigida para os tons de baixo contraste. Cor segue o Projeto, nunca a posição.
const PALETTE = ['#2a78d6', '#1baf7a', '#eda100', '#008300', '#4a3aa7', '#e34948', '#e87ba4', '#eb6834'];
const projColor = new Map();
function colorFor(projeto) {
  if (!projeto) return '#c3c2b7';
  if (!projColor.has(projeto)) {
    projColor.set(projeto, projColor.size < PALETTE.length ? PALETTE[projColor.size] : '#898781');
  }
  return projColor.get(projeto);
}

function renderTimeline(d) {
  const host = $('timeline');
  host.innerHTML = '';
  const pts = (d.ponto || []).flat().map(toMin);
  const blocks = d.blocks.filter(b => b.start && b.end);
  const all = blocks.flatMap(b => [toMin(b.start), toMin(b.end)]).concat(pts);
  if (!all.length) return;
  const t0 = Math.min(...all), t1 = Math.max(...all), span = Math.max(1, t1 - t0);
  const pct = m => (m - t0) / span * 100;

  const strip = document.createElement('div');
  strip.className = 'tl';
  for (const b of blocks) {
    const s = toMin(b.start), e = toMin(b.end);
    const seg = document.createElement('div');
    seg.className = 'seg' + (b.kind === 'lacuna' ? ' lacuna' : '');
    seg.style.left = pct(s) + '%';
    seg.style.width = `calc(${Math.max(0, pct(e) - pct(s))}% - 2px)`; // 2px de respiro entre blocos
    if (b.kind !== 'lacuna') seg.style.background = colorFor(b.projeto);
    seg.title = b.kind === 'lacuna'
      ? `${b.start}–${b.end}  Lacuna (${b.dur_min} min)`
      : `${b.start}–${b.end}  ${b.projeto || b.contexto || '?'}${b.descricao ? ' - ' + b.descricao : ''}`;
    if (b.id) seg.onclick = () => {
      const tr = [...$('tbl').tBodies[0].rows].find(r => +r.dataset.id === b.id);
      if (tr) { tr.scrollIntoView({ block: 'center', behavior: 'smooth' }); tr.classList.remove('flash'); void tr.offsetWidth; tr.classList.add('flash'); }
    };
    strip.appendChild(seg);
  }
  for (const m of state.migalhas) {
    const tick = document.createElement('div');
    tick.className = 'tick';
    tick.style.left = pct(toMin(m.hora)) + '%';
    tick.title = `Migalha ${m.hora} · ${m.dur_min}min · ${m.title || m.contexto}`;
    strip.appendChild(tick);
  }
  host.appendChild(strip);

  const axis = document.createElement('div');
  axis.className = 'tlaxis';
  const stepH = span > 12 * 60 ? 2 : 1;
  for (let h = Math.ceil(t0 / 60); h * 60 <= t1; h += stepH) {
    const lab = document.createElement('span');
    lab.style.left = pct(h * 60) + '%';
    lab.textContent = `${h}h`;
    axis.appendChild(lab);
  }
  host.appendChild(axis);

  const used = [...new Set(blocks.filter(b => b.kind !== 'lacuna' && b.projeto).map(b => b.projeto))];
  if (used.length || blocks.some(b => b.kind === 'lacuna')) {
    const leg = document.createElement('div');
    leg.className = 'tlleg';
    for (const p of used) {
      const item = document.createElement('span');
      const sw = document.createElement('span');
      sw.className = 'sw'; sw.style.background = colorFor(p);
      item.append(sw, document.createTextNode(p));
      leg.appendChild(item);
    }
    if (blocks.some(b => b.kind === 'lacuna')) {
      const item = document.createElement('span');
      const sw = document.createElement('span');
      sw.className = 'sw';
      sw.style.background = 'var(--lac) repeating-linear-gradient(45deg, rgba(0,0,0,.12) 0 2px, transparent 2px 4px)';
      item.append(sw, document.createTextNode('Lacuna'));
      leg.appendChild(item);
    }
    host.appendChild(leg);
  }
}

function render(d) {
  $('dayStatus').textContent = `status: ${d.status}`;
  if (d.ponto) $('ponto').value = d.ponto.map(p => p.join('-')).join(', ');
  state.migalhas = d.migalhas;
  const tb = $('tbl').tBodies[0];
  tb.innerHTML = '';
  d.blocks.forEach(b => tb.appendChild(row(b)));
  $('migalhas').innerHTML = d.migalhas.map((m, i) =>
    `<span class="chip">${esc(m.hora)} · ${m.dur_min}min · ${esc(m.title || m.contexto)}
     <button onclick="promover(${i})">Promover</button></span>`).join('') ||
    '<span class="mut">nenhuma</span>';
  $('migalhasBox').querySelector('summary b').textContent =
    `Migalhas absorvidas (${d.migalhas.length})`;
  $('migalhasBox').open = d.migalhas.length <= 3;
  renderTimeline(d);
  if (d.status === 'aprovado' && d.resumo) {
    state.resumo = d.resumo;
    $('diverg').textContent = ` - total ${Math.floor(d.total_min / 60)}h${String(d.total_min % 60).padStart(2, '0')}` +
      (d.divergencia_min != null ? `, divergência do ponto: ${d.divergencia_min} min` : '');
    $('resumo').innerHTML = d.resumo.map((l, i) =>
      `<div class="rl"><code>${esc(l)}</code><button onclick="copyLine(${i})">⧉</button></div>`).join('');
    $('resumoCard').style.display = '';
  }
  if (d.warning) msg(d.warning);
}

// Promover fatia o bloco que absorveu a Migalha (o tempo dela já estava contado lá);
// sem o fatiamento, o dia contaria a mesma faixa duas vezes.
function promover(i) {
  const m = state.migalhas[i];
  const s = toMin(m.hora), rawEnd = s + m.dur_min;
  const tb = $('tbl').tBodies[0];
  for (const tr of [...tb.rows]) {
    if (tr.dataset.kind !== 'work') continue;
    const g = f => tr.querySelector(`[data-f=${f}]`)?.value || '';
    const bs = toMin(g('start')), be = toMin(g('end'));
    if (!(s >= bs && s < be)) continue;
    const e = Math.min(rawEnd, be);
    const fields = { projeto: g('projeto'), ticket: g('ticket'),
      atividade: g('atividade'), descricao: g('descricao') };
    const parts = [];
    if (s - bs >= 1) parts.push(row({ ...fields, start: toHM(bs), end: toHM(s), kind: 'work',
      id: +tr.dataset.id || null }));
    parts.push(row({ start: toHM(s), end: toHM(e), kind: 'work', descricao: m.title }));
    if (be - e >= 1) parts.push(row({ ...fields, start: toHM(e), end: toHM(be), kind: 'work' }));
    parts.reverse().forEach(p => tr.after(p));
    tr.remove();
    msg('Migalha promovida: o bloco que a absorveu foi fatiado. Revise e salve as edições.');
    return;
  }
  tb.appendChild(row({ start: m.hora, end: toHM(rawEnd), kind: 'work', descricao: m.title }));
  msg('Migalha promovida como novo bloco. Salve as edições.');
}

async function load() {
  msg('');
  $('resumoCard').style.display = 'none';
  $('csvLink').href = `/api/day/${$('date').value}/export.csv`;
  try { render(await api('/day/' + $('date').value)); } catch (e) { msg(e.message); }
}

async function savePonto() {
  const ponto = $('ponto').value.split(',').map(s => s.trim()).filter(Boolean)
    .map(p => p.split('-').map(x => x.trim()));
  try { render(await api(`/day/${$('date').value}/ponto`, 'POST', { ponto })); msg(''); }
  catch (e) { msg(e.message); }
}

async function propose() {
  if ($('tbl').tBodies[0].rows.length &&
      !confirm('Gerar nova proposta apaga os blocos atuais, INCLUSIVE edições manuais. Continuar?')) return;
  msg('Gerando proposta (segmentação + IA)...');
  try { render(await api(`/day/${$('date').value}/propose`, 'POST')); if (!$('msg').textContent.includes('falhou')) msg(''); }
  catch (e) { msg(e.message); }
}

async function reclassify() {
  msg('Reclassificando via IA (blocos não editados)...');
  try {
    const d = await api(`/day/${$('date').value}/classify`, 'POST', {});
    render(d);
    msg(`${d.reclassificados} bloco(s) reclassificado(s).`);
  } catch (e) { msg(e.message); }
}

async function reclassifyOne(id) {
  msg('Reclassificando bloco...');
  try {
    await api(`/day/${$('date').value}/blocks`, 'PUT', { blocks: collect() });
    const d = await api(`/day/${$('date').value}/classify`, 'POST', { ids: [id] });
    render(d);
    msg('Bloco reclassificado.');
  } catch (e) { msg(e.message); }
}

async function saveBlocks() {
  try { render(await api(`/day/${$('date').value}/blocks`, 'PUT', { blocks: collect() })); msg('Edições salvas.'); }
  catch (e) { msg(e.message); }
}

function copyAll() { navigator.clipboard.writeText(state.resumo.join('\n')); }
function copyLine(i) { navigator.clipboard.writeText(state.resumo[i]); }

async function approve() {
  try {
    await api(`/day/${$('date').value}/blocks`, 'PUT', { blocks: collect() });
    const r = await api(`/day/${$('date').value}/approve`, 'POST');
    state.resumo = r.resumo;
    $('resumo').innerHTML = r.resumo.map((l, i) =>
      `<div class="rl"><code>${esc(l)}</code><button class="ghost" title="Copiar linha" onclick="copyLine(${i})">⧉</button></div>`).join('');
    $('diverg').textContent = ` - total ${Math.floor(r.total_min / 60)}h${String(r.total_min % 60).padStart(2, '0')}` +
      (r.divergencia_min != null ? `, divergência do ponto: ${r.divergencia_min} min` : '');
    $('resumoCard').style.display = '';
    $('pushMsg').textContent = '';
    $('dayStatus').textContent = 'status: aprovado';
  } catch (e) { msg(e.message); }
}

async function pushClockify() {
  if (!confirm('Enviar os Lançamentos deste dia ao Clockify? Reenviar substitui os lançamentos que a ferramenta criou antes.')) return;
  $('pushMsg').textContent = 'Enviando...';
  try {
    const r = await api(`/day/${$('date').value}/clockify`, 'POST');
    $('pushMsg').textContent = `${r.criados} lançamento(s) criado(s)` +
      (r.substituidos ? `, ${r.substituidos} substituído(s)` : '') +
      (r.erros.length ? ` - erros: ${r.erros.join(' | ')}` : '.');
  } catch (e) { $('pushMsg').textContent = 'Erro: ' + e.message; }
}

async function loadSettings() {
  const s = await api('/settings');
  $('ckState').textContent = s.clockify_api_key ? '(configurada ✓)' : '(faltando)';
  $('orState').textContent = s.openrouter_api_key ? '(configurada ✓)' : '(faltando)';
  $('model').value = s.model;
  $('jiraUrl').value = s.jira_base_url;
  $('jiraEmail').value = s.jira_email;
  $('jiraState').textContent = s.jira_api_token ? '(configurado ✓)' : '(faltando)';
}
async function saveSettings() {
  await api('/settings', 'POST', { clockify_api_key: $('ck').value, openrouter_api_key: $('or').value, model: $('model').value,
    jira_base_url: $('jiraUrl').value, jira_email: $('jiraEmail').value, jira_api_token: $('jiraTok').value });
  $('ck').value = $('or').value = $('jiraTok').value = '';
  $('dlgMsg').textContent = 'Salvo.';
  loadSettings(); refreshStatus();
}
async function syncClockify() {
  $('dlgMsg').textContent = 'Sincronizando...';
  try {
    const r = await api('/clockify/sync', 'POST');
    $('dlgMsg').textContent = `OK: ${r.projetos} projetos, ${r.atividades} atividades, ${r.lancamentos_lidos} lançamentos lidos.`;
    await loadOptions();
  } catch (e) { $('dlgMsg').textContent = 'Erro: ' + e.message; }
}
async function syncJira() {
  $('dlgMsg').textContent = 'Sincronizando Jira...';
  try {
    const r = await api('/jira/sync', 'POST');
    $('dlgMsg').textContent = `OK: ${r.tickets} tickets do Jira viram candidatos do classificador.`;
  } catch (e) { $('dlgMsg').textContent = 'Erro: ' + e.message; }
}

async function loadOptions() {
  options = await api('/options');
  $('projList').innerHTML = options.projetos.map(p => `<option value="${esc(p)}">`).join('');
}

async function refreshStatus() {
  const s = await api('/status');
  const c = s.coletor || {};
  let alerta = '';
  if (c.erro) alerta = ` <span class="err">⚠ coletor com erro: ${esc(c.erro)}</span>`;
  else if (c.ociosidade_ok === false) alerta = ' <span class="err">⚠ detecção de ociosidade indisponível - Lacunas não serão detectadas</span>';
  $('colStatus').innerHTML = `<span class="dot ${s.samples_hoje ? 'ok' : ''}"></span> ${s.samples_hoje} amostras hoje` +
    (s.ultima ? ` <span class="mut">(última ${esc(s.ultima.hora)}: ${esc(s.ultima.app)})</span>` : '') + alerta;
}

$('date').value = new Date().toLocaleDateString('sv');
$('date').onchange = load;
loadOptions().then(load);
loadSettings();
refreshStatus();
setInterval(refreshStatus, 30000);
</script>
